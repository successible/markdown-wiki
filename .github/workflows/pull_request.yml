name: Pull Request

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  CI:
      runs-on: ubuntu-22.04
      steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - uses: pnpm/action-setup@v2.2.2
          with:
            version: 7
        
        - name: Use Node.js 16
          uses: actions/setup-node@v2
          with:
            node-version: 16
            cache: 'pnpm'
      
        - name: Install dependencies
          run: pnpm install

        - name: Run the pretest suite
          run: npm run pretest